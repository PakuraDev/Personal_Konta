<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Konta</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0DB3F1">
    <link rel="apple-touch-icon" href="./assets/img/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/components.css"> <link rel="preload" href="./assets/fonts/Lexend-Variable.ttf" as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="./assets/fonts/PlusJakartaSans-Variable.ttf" as="font" type="font/ttf" crossorigin>
</head>
<body data-theme="normal">
    
    <main id="app-root"></main>


    <template id="tpl-pantalla-inicio">
        <div class="pantalla-container" id="pantalla-inicio">
            
            <header class="header-intro">
                <h2 class="h2">Bienvenido a Konta</h2>
            </header>

            <main class="formulario-box">
                <button type="button" class="btn-cuadrado" id="btn-toggle-contrast">
                    <span class="p-button btn-text-fill">Modo Contraste Alto</span>
                    <img src="./assets/svg/Not-Select.svg" alt="Activar" id="icon-contrast">
                </button>

                <div class="input-base">
                    <input type="text" class="p-base" id="input-usuario" placeholder="Usuario...">
                </div>
                
                <div class="input-with-icon">
                    <input type="text" class="p-base" id="input-url-api" placeholder="Url del Worker...">
                    <button type="button" class="icon-button" id="btn-scan-qr" aria-label="Escanear QR">
                        <img src="./assets/svg/Camara.svg" alt="Cámara">
                    </button>
                </div>
            </main>

            <footer class="botones-footer">
                <button type="button" class="btn-circular p-button" style="width: 100%;" id="btn-iniciar-sesion">
                    <span class="btn-text-fill">Iniciar sesión</span>
                </button>
                <button type="button" class="link-caption p-caption" id="link-ir-crear">
                    ¿Es la primera vez que usas la app? Crea una base de datos
                </button>
            </footer>
        </div>
    </template>

    <template id="tpl-pantalla-configuracion">
        <div class="pantalla-container" id="pantalla-configuracion">
            
            <header class="header-intro">
                <h2 class="h2">Vamos a crear una DB</h2>
            </header>

            <main class="formulario-box">
                <button type="button" class="btn-cuadrado" id="btn-toggle-contrast-config">
                    <span class="p-button btn-text-fill">Modo Contraste Alto</span>
                    <img src="./assets/svg/Not-Select.svg" alt="Activar" id="icon-contrast-config">
                </button>

                <div class="input-base">
                    <input type="text" class="p-base" id="input-usuario-config" placeholder="Tu nombre de usuario...">
                </div>
                <div class="input-base">
                    <input type="text" class="p-base" id="input-url-schema" placeholder="Url del worker (schema)...">
                </div>
                <div class="input-base">
                    <input type="text" class="p-base" id="input-url-api-config" placeholder="Url del worker (API)...">
                </div>
                
                <!-- Bug #1: Inputs dinámicos para que el usuario defina su familia y presupuesto -->
                <div class="input-base">
                    <input type="text" class="p-base" id="input-otros-usuarios" placeholder="Otros usuarios separados por coma (ej: Mamá, Papá)">
                </div>
                <div class="input-base">
                    <input type="number" step="0.01" class="p-base" id="input-presupuesto-base" placeholder="Presupuesto semanal base (€)">
                </div>
            </main>

            <footer class="botones-footer">
                <button type="button" class="btn-circular p-button" style="width: 100%;" id="btn-crear-db">
                    <span class="btn-text-fill">Crear</span>
                </button>
                <button type="button" class="link-caption p-caption" id="link-ir-inicio">
                    ¿Le has dado sin querer o no es lo que buscas? Vuelve atrás.
                </button>
            </footer>
        </div>
    </template>
    
    <template id="tpl-add-registro">
        <div class="pantalla-container">
            <header class="header-intro" style="justify-content: flex-start; gap: 16px;">
                <button type="button" class="icon-button" id="btn-back-dashboard">
                    <img src="./assets/svg/Flecha-Atras.svg" alt="Atrás">
                </button>
                <h2 class="h2">Añadir registro</h2>
            </header>

            <main class="formulario-box">
                <div class="input-base">
                    <input type="text" class="p-base" id="input-concepto" placeholder="Concepto...">
                </div>
                <div class="input-base">
                    <input type="text" class="p-base" id="input-descripcion" placeholder="Descripción...">
                </div>
                
                <div class="input-with-icon">
                    <input type="number" step="0.01" class="p-base" id="input-precio" placeholder="¿Cuánto has pagado?">
                    <span class="p-base" style="color: var(--negro-suave);">€</span>
                </div>
            </main>

            <footer class="botones-footer">
                <button type="button" class="btn-circular p-button" style="width: 100%;" id="btn-submit-registro">
                    <span class="btn-text-fill">Registrar</span>
                </button>
            </footer>
        </div>
    </template>

    <template id="tpl-dashboard">
        <div class="pantalla-container" id="dashboard-view">
            
            <header class="header-dash">
                <div class="saludo-row">
                    <h2 class="h2 text-celeste" id="dash-saludo">Hola [Nombre]</h2>
                    <button class="icon-button" id="btn-open-menu">
                        <img src="./assets/svg/Menu.svg" alt="Menú">
                    </button>
                </div>

                <div class="contador-dinero" id="btn-edit-presupuesto">
                    <span class="h1 cantidad-actual" id="dash-dinero-actual">0,00</span>
                    <span class="h2 cantidad-max" id="dash-dinero-max">/0</span>
                </div>
            </header>

            <main class="contenido-principal" id="lista-gastos">
            </main>

            <button class="fab-button" id="btn-ir-add-registro">
                <span class="p-button" style="color: var(--negro-suave);">Añadir registro</span>
            </button>


            <div class="overlay-background" id="main-overlay">
                
                <div class="modal-bottom-sheet" id="modal-ver-registro" style="display: none;">
                    <div class="modal-drag-handle" id="modal-handle"></div>
                    
                    <h2 class="h2 text-celeste" style="text-align: center;" id="modal-concepto">[Concepto]</h2>
                    
                    <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 16px;">
                        <p class="p-base" id="modal-precio" style="font-weight: 600;">[Precio]</p>
                        <p class="p-base" id="modal-autor">Hecho por [usuario]</p>
                        <p class="p-base" id="modal-fecha">[Fecha y hora]</p>
                        <p class="p-base" id="modal-desc" style="margin-top: 8px;">[Descripción]</p>
                    </div>

                    <div class="modal-botones-row">
                        <button class="btn-circular p-button" id="btn-modal-editar">Editar</button>
                        <button class="btn-circular p-button bg-celeste" id="btn-modal-borrar">Borrar</button>
                    </div>
                </div>

                <div class="modal-center" id="modal-qr" style="display: none;">
                    <div class="qr-canvas-container" id="qr-container"></div>
                    <button class="btn-circular p-button" style="width: 100%; margin-top: 24px;" id="btn-close-qr">Cerrar</button>
                </div>

                <div class="sidebar" id="sidebar-menu" style="display: none;">
                    <div class="sidebar-calendario">
                        <h3 class="h3" style="text-align: center; color: var(--negro-suave);">Marzo 2026</h3>
                        <p class="p-caption" style="text-align: center;">(Calendario en construcción)</p>
                    </div>
                    
                    <div class="sidebar-footer">
                        <button class="btn-circular p-button" style="width: 100%;" id="btn-compartir-qr">Compartir QR</button>
                        <button class="btn-circular p-button bg-celeste btn-text-white" style="width: 100%;" id="btn-cerrar-sesion">Cerrar sesión</button>
                    </div>
                </div>

            </div> </div>
    </template>

    <template id="tpl-scanner">
        <div class="pantalla-container">
            <header class="header-intro" style="justify-content: flex-start; gap: 16px;">
                <button type="button" class="icon-button" id="btn-cancel-scan">
                    <img src="./assets/svg/Flecha-Atras.svg" alt="Atrás">
                </button>
                <h2 class="h2">Escanear QR</h2>
            </header>
            <main class="formulario-box" style="justify-content: center;">
                <div id="reader" style="width: 100%; border-radius: 12px; overflow: hidden;"></div>
                <p class="p-base" style="text-align: center; margin-top: 16px;">Apunta a la URL del Worker</p>
            </main>
        </div>
    </template>

    <!-- Plantilla para Errores Críticos de Seguridad -->
    <template id="tpl-error-seguridad">
      <div class="pantalla-container" style="background-color: var(--celeste); color: white; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px; min-height: 100vh;">
        <div>
          <h2 class="h2" style="margin-bottom: 20px;">Error de Seguridad</h2>
          <p class="p-base">No se pudo generar la huella digital del dispositivo.</p>
          <p class="p-caption" style="margin-top: 10px;">Por favor, usa un navegador moderno o asegúrate de estar en un contexto seguro.</p>
          <button onclick="location.reload()" class="btn-circular" style="margin-top: 30px; width: 100%;">Reintentar</button>
        </div>
      </div>
    </template>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js" integrity="sha512-PEhlWBZBrQL7flpJPY8lXx8tIN7HWX912GzGhFTDqA3iWFrakVH3lVHomCoU9BhfKzgxfEk6EG2C3xej+9srOQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
